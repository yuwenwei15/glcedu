{% extends "base.html" %}
{% block title %}服务器错误{% endblock %}

{% block content %}
<section class="py-24 px-5 md:px-16 max-w-container mx-auto text-center">
  <div class="max-w-md mx-auto">
    <span class="material-symbols-outlined text-8xl text-primary/30 mb-6 block">error</span>
    <h1 class="font-serif-cn text-4xl text-on-surface mb-4">500</h1>
    <p class="font-sans-cn text-lg text-on-surface-variant mb-8">服务器遇到内部错误，请稍后再试。</p>
    <a href="{{ url_for('views.index') }}"
       class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white text-sm rounded-full hover:bg-primary-dark transition-all">
      <span class="material-symbols-outlined text-base">home</span>
      返回首页
    </a>
  </div>
</section>
{% endblock %}
